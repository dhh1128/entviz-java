name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Third-party actions are pinned by full commit SHA (node24-runtime versions).
# A mutable tag like @v5 can be silently retargeted; the `# vN` comment records
# the human-readable version the SHA corresponds to.
jobs:
  build:
    name: build + test (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165  # v5.0.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build + test (mvn verify)
        run: mvn -B clean verify

  conformance:
    name: Tier-A conformance (full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # The entviz reference repo carries the algorithm spec, SPEC_VERSION, the
      # golden conformance corpus, and the single authoritative Python runner
      # this artifact is certified against. PINNED to tag v0.11.1: that tag
      # carries the enhanced runner (--skip-file, external-impl invariant pairs,
      # and the spec-version-match assertion). NOTE: bumping this artifact's
      # SPEC_VERSION later REQUIRES bumping this pin in lockstep — the runner
      # asserts the corpus spec_version equals the impl's data-entviz-version and
      # fails loudly on a mismatch. Sparse-checkout only `compliance` (corpus +
      # runner) and `src` (the entviz package the runner imports for model
      # extraction).
      - name: Check out the entviz reference (spec + corpus + runner)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          ref: v0.11.1
          path: entviz-ref
          sparse-checkout: |
            compliance
            src
          persist-credentials: false

      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165  # v5.0.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # setup-python@v6.0.0 runs on the node24 runtime (verified: action.yml
      # `using: node24`).
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: '3.x'

      - name: Install the Tier-A harness (lxml only; no rasterizer needed)
        run: pip install lxml

      - name: Build the classes
        run: mvn -B -q clean compile

      # Full Tier A (render model) + error-rejection + invariant pairs +
      # spec-version-match. No --skip-file: entviz-java is FULL conformance, so
      # every corpus vector must pass. The runner's own spec-version-match
      # assertion guards corpus/impl agreement. ENTVIZ_JAVA_HOME points the
      # bin/entviz-conformance wrapper at the JDK setup-java provisioned. Only
      # trusted workspace paths are interpolated.
      - name: Tier-A conformance (full corpus, hard gate)
        env:
          ENTVIZ_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          cd entviz-ref
          PYTHONPATH=src:. python -m compliance.runner \
            --impl-cmd "${GITHUB_WORKSPACE}/bin/entviz-conformance" --tiers A

  conformance-tier-b:
    name: Tier-B conformance (raster, full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Same pinned reference as the Tier-A job (see that job's note): tag
      # v0.11.1 carries the enhanced runner, and the pin must move with this
      # artifact's SPEC_VERSION.
      - name: Check out the entviz reference (spec + corpus + runner)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          ref: v0.11.1
          path: entviz-ref
          sparse-checkout: |
            compliance
            src
          persist-credentials: false

      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165  # v5.0.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: '3.x'

      # Tier B rasterizes the SVG and compares against the golden PNG, so the
      # harness additionally needs cairosvg + pillow (and the system Cairo lib).
      - name: Install the Tier-B harness (lxml + cairosvg + pillow)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcairo2
          pip install lxml cairosvg pillow

      - name: Build the classes
        run: mvn -B -q clean compile

      - name: Tier-B conformance (full corpus, hard gate)
        env:
          ENTVIZ_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          cd entviz-ref
          PYTHONPATH=src:. python -m compliance.runner \
            --impl-cmd "${GITHUB_WORKSPACE}/bin/entviz-conformance" --tiers B
